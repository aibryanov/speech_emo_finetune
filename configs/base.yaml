batch_size: 8
grad_accum_steps: 4
lr: 3.0e-4
epochs: 10
weight_decay: 0.01
warmup_ratio: 0.1
scheduler_type: linear
label_smoothing: 0.0
augment: false
aug_noise_std: 0.005
aug_time_mask_ratio: 0.1
aug_amplitude_range: [0.8, 1.2]
use_spec_augment: false
dev_ratio: 0.15
seed: 42
max_audio_len_s: 10.0
num_workers: 2
lora_rank: 8
lora_alpha: 16
lora_dropout: 0.05
lora_target_modules:
  - q_proj
  - v_proj
top_n_layers: 4
lstm_hidden: 256
lstm_layers: 2
lstm_dropout: 0.1
merge_labels: true
num_labels: 7
