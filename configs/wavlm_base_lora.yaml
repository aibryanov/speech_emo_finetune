model_name: xbgoose/wavlm-base-speech-emotion-recognition-russian-dusha-finetuned
processor_name: microsoft/wavlm-base
fine_tune_strategy: lora
lora_rank: 32
lora_alpha: 64
lora_dropout: 0.05
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - out_proj
batch_size: 8
grad_accum_steps: 4
lr: 2.0e-4
head_lr: 5.0e-3
epochs: 30
weight_decay: 0.01
scheduler_type: cosine
warmup_steps: 20
label_smoothing: 0.1
augment: true
aug_noise_std: 0.005
aug_time_mask_ratio: 0.1
aug_amplitude_range: [0.8, 1.2]
use_spec_augment: false
run_name: wavlm_base_lora
output_dir: outputs/wavlm_base_lora
merge_labels: true
